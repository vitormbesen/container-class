# https://blog.nginx.org/blog/dynamic-dns-resolution-open-sourced-in-nginx
# valid=5s resolves containers IPs
upstream backend_servers {
    zone backend_zone 64k;
    resolver 127.0.0.11 valid=5s;
    resolver_timeout 5s;

    # 'resolve' enables dynamic DNS re-resolution in the background
    # Docker DNS returns all backend container IPs; nginx manages them as peers
    server backend:5000 resolve;
}

server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend_servers;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Connection pooling (only works with upstream, not variable trick)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}